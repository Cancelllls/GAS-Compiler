<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style id="theme-style">
    /* Default: VS Code Dark+ */
    :root {
      --bg-activity: #333333;
      --bg-sidebar: #252526;
      --bg-editor: #1e1e1e;
      --bg-terminal: #000000;
      --bg-status: #007acc;
      --text-main: #d4d4d4;
      --border: #444444;
      --line-num: #858585;
      --accent: #007acc;
      
      /* Syntax Colors */
      --syn-keyword: #569cd6;
      --syn-string: #ce9178;
      --syn-comment: #6a9955;
      --syn-number: #b5cea8;
      --syn-func: #dcdcaa;
      --syn-var: #9cdcfe;
    }

    .theme-monokai {
      --bg-activity: #272822;
      --bg-sidebar: #3e3d32;
      --bg-editor: #272822;
      --text-main: #f8f8f2;
      --syn-keyword: #f92672;
      --syn-string: #e6db74;
      --syn-comment: #75715e;
      --syn-number: #ae81ff;
      --syn-func: #a6e22e;
      --syn-var: #66d9ef;
    }

    .theme-solarized {
      --bg-activity: #00212b;
      --bg-sidebar: #073642;
      --bg-editor: #002b36;
      --text-main: #839496;
      --syn-keyword: #859900;
      --syn-string: #2aa198;
      --syn-comment: #586e75;
      --syn-number: #d33682;
      --syn-func: #268bd2;
      --syn-var: #b58900;
    }

    body, html {
      margin: 0; padding: 0; height: 100%;
      background-color: var(--bg-editor);
      color: var(--text-main);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100vh; }
    
    /* Layout */
    .main { display: flex; flex: 1; overflow: hidden; }
    
    .activity-bar {
      width: 50px; background: var(--bg-activity);
      display: flex; flex-direction: column; align-items: center; padding-top: 10px;
    }
    .act-icon { font-size: 24px; margin-bottom: 20px; cursor: pointer; opacity: 0.6; }
    .act-icon.active { opacity: 1; border-left: 2px solid white; width: 100%; text-align: center; }

    .sidebar { width: 250px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; opacity: 0.7; }
    .sidebar-content { flex: 1; padding: 10px; font-size: 13px; }

    .editor-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Tabs */
    .tabs { height: 35px; background: var(--bg-sidebar); display: flex; align-items: center; border-bottom: 1px solid var(--border); }
    .tab { padding: 0 15px; height: 100%; display: flex; align-items: center; background: var(--bg-editor); border-right: 1px solid var(--border); font-size: 13px; cursor: default; }
    
    /* Advanced Editor */
    .editor-core { flex: 1; display: flex; position: relative; overflow: hidden; background: var(--bg-editor); }
    
    #line-numbers {
      width: 50px; background: var(--bg-editor); color: var(--line-num);
      text-align: right; padding: 10px 10px; font-family: 'Consolas', monospace;
      font-size: 14px; line-height: 20px; border-right: 1px solid var(--border);
    }

    .code-container { flex: 1; position: relative; overflow: hidden; }
    
    #code-input, #highlight-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      margin: 0; padding: 10px; border: none; outline: none;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px; line-height: 20px;
      white-space: pre; overflow: auto;
      box-sizing: border-box;
      tab-size: 2;
    }

    #code-input {
      background: transparent; color: transparent; caret-color: var(--text-main);
      z-index: 2; resize: none;
    }

    #highlight-layer { z-index: 1; color: var(--text-main); pointer-events: none; }

    /* Syntax Tokens */
    .keyword { color: var(--syn-keyword); font-weight: bold; }
    .string { color: var(--syn-string); }
    .comment { color: var(--syn-comment); font-style: italic; }
    .number { color: var(--syn-number); }
    .function { color: var(--syn-func); }
    .variable { color: var(--syn-var); }

    /* Terminal */
    .terminal-pane { height: 200px; background: var(--bg-terminal); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
    .terminal-header { background: var(--bg-sidebar); padding: 5px 15px; font-size: 11px; display: flex; gap: 20px; }
    #terminal-out { flex: 1; padding: 10px; color: #00ff00; font-family: monospace; overflow-y: auto; font-size: 13px; }

    /* Status Bar */
    .status-bar { height: 22px; background: var(--bg-status); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 12px; }
    
    /* Settings */
    select { background: #3c3c3c; color: white; border: 1px solid var(--border); padding: 2px; font-size: 12px; width: 100%; margin-bottom: 10px; }
    
    .run-btn { background: #28a745; color: white; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; margin-left: 10px; border-radius: 2px; }
  </style>
</head>
<body class="theme-dark-plus">

<div class="app">
  <div class="main">
    <!-- Activity Bar -->
    <div class="activity-bar">
      <div class="act-icon active" title="Explorer">📄</div>
      <div class="act-icon" title="Search">🔍</div>
      <div class="act-icon" title="Extensions">🧱</div>
      <div class="act-icon" style="margin-top:auto" title="Settings">⚙️</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">Explorer</div>
      <div class="sidebar-content">
        <div style="margin-bottom:10px">📁 WORKSPACE</div>
        <div style="padding-left:15px">📄 main.gas</div>
        
        <div class="sidebar-header" style="margin-top:20px; padding:10px 0">Settings</div>
        <label style="font-size:11px">LANGUAGE</label>
        <select id="lang-select" onchange="updateSyntax()">
          <option value="custom">Custom GAS</option>
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
        </select>

        <label style="font-size:11px">THEME</label>
        <select id="theme-select" onchange="updateTheme()">
          <option value="dark-plus">Dark+</option>
          <option value="monokai">Monokai</option>
          <option value="solarized">Solarized Dark</option>
        </select>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-pane">
      <div class="tabs">
        <div class="tab">main.gas</div>
        <button class="run-btn" onclick="execute()">▶ RUN</button>
      </div>
      <div class="editor-core">
        <div id="line-numbers">1</div>
        <div class="code-container">
          <div id="highlight-layer"></div>
          <textarea id="code-input" spellcheck="false" oninput="onCodeInput()" onscroll="onCodeScroll()">LET x = 1
LET limit = 10

PRINT "Starting Multi-language Clone..."

WHILE x <= limit
  PRINT "Step: " + x
  ADD x 1
ENDWHILE

PRINT "Success!"</textarea>
        </div>
      </div>

      <!-- Terminal -->
      <div class="terminal-pane">
        <div class="terminal-header">
          <span>TERMINAL</span>
          <span>OUTPUT</span>
          <span>DEBUG CONSOLE</span>
        </div>
        <div id="terminal-out">Ready to compile...</div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div id="status-l">Ready</div>
    <div id="status-r">UTF-8 | Ln 1, Col 1 | Spaces: 2</div>
  </div>
</div>

<script>
  const input = document.getElementById('code-input');
  const highlight = document.getElementById('highlight-layer');
  const lineNums = document.getElementById('line-numbers');
  const term = document.getElementById('terminal-out');

  // Syntax Engine
  const rules = {
    custom: [
      { regex: /\b(LET|ADD|PRINT|WHILE|ENDWHILE)\b/g, class: 'keyword' },
      { regex: /".*?"/g, class: 'string' },
      { regex: /\/\/.*/g, class: 'comment' },
      { regex: /\b\d+\b/g, class: 'number' }
    ],
    javascript: [
      { regex: /\b(const|let|var|function|return|if|else|for|while|import|export|class|new|try|catch)\b/g, class: 'keyword' },
      { regex: /".*?"|'.*?'|`.*?`/g, class: 'string' },
      { regex: /\/\/.*|\/\*[\s\S]*?\*\//g, class: 'comment' },
      { regex: /\b\d+\b/g, class: 'number' },
      { regex: /\b[a-zA-Z_]\w*(?=\s*\()/g, class: 'function' }
    ],
    python: [
      { regex: /\b(def|return|if|elif|else|for|while|import|from|class|try|except|print|as|in)\b/g, class: 'keyword' },
      { regex: /".*?"|'.*?'/g, class: 'string' },
      { regex: /#.*/g, class: 'comment' },
      { regex: /\b\d+\b/g, class: 'number' }
    ]
  };

  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
  }

  function applyHighlight(text, lang) {
    let html = escapeHTML(text);
    const langRules = rules[lang] || rules.custom;
    
    // We need to apply regex on the raw text but preserve HTML tags
    // A simple trick: use markers
    let matches = [];
    langRules.forEach(rule => {
      let match;
      while ((match = rule.regex.exec(text)) !== null) {
        matches.push({ start: match.index, end: match.index + match[0].length, class: rule.class });
      }
    });

    // Sort matches by start index
    matches.sort((a, b) => a.start - b.start);

    // Filter overlapping (keep first)
    let lastEnd = 0;
    let finalHtml = "";
    matches.forEach(m => {
      if (m.start >= lastEnd) {
        finalHtml += escapeHTML(text.substring(lastEnd, m.start));
        finalHtml += `<span class="${m.class}">${escapeHTML(text.substring(m.start, m.end))}</span>`;
        lastEnd = m.end;
      }
    });
    finalHtml += escapeHTML(text.substring(lastEnd));
    
    return finalHtml + "\n"; // Extra newline for scroll sync
  }

  function onCodeInput() {
    const text = input.value;
    const lang = document.getElementById('lang-select').value;
    highlight.innerHTML = applyHighlight(text, lang);
    
    // Update Line Numbers
    const count = text.split('\n').length;
    lineNums.innerHTML = Array.from({length: count}, (_, i) => i + 1).join('<br>');
    
    updateCursorInfo();
  }

  function onCodeScroll() {
    highlight.scrollTop = input.scrollTop;
    highlight.scrollLeft = input.scrollLeft;
    lineNums.scrollTop = input.scrollTop;
  }

  function updateTheme() {
    const theme = document.getElementById('theme-select').value;
    document.body.className = 'theme-' + theme;
  }

  function updateSyntax() {
    onCodeInput();
  }

  function updateCursorInfo() {
    const start = input.selectionStart;
    const textBefore = input.value.substring(0, start);
    const lines = textBefore.split('\n');
    const ln = lines.length;
    const col = lines[lines.length - 1].length + 1;
    document.getElementById('status-r').innerText = `UTF-8 | Ln ${ln}, Col ${col} | Spaces: 2`;
  }

  // Handle Tab and Enter indentation
  input.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = input.selectionStart;
      input.value = input.value.substring(0, s) + "  " + input.value.substring(input.selectionEnd);
      input.selectionStart = input.selectionEnd = s + 2;
      onCodeInput();
    }
  });

  input.addEventListener('click', updateCursorInfo);
  input.addEventListener('keyup', updateCursorInfo);

  function execute() {
    const code = input.value;
    const lang = document.getElementById('lang-select').value;
    term.innerText = "> Initializing compilation for [" + lang.toUpperCase() + "]...\n";
    document.getElementById('status-l').innerText = "Running...";
    
    google.script.run
      .withSuccessHandler(res => {
        term.innerText = res;
        document.getElementById('status-l').innerText = "Success";
        term.scrollTop = term.scrollHeight;
      })
      .compileAndRun(code, lang);
  }

  // Initial Sync
  onCodeInput();
</script>

</body>
</html>
